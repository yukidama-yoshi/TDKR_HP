<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>田所のホームページ</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: "MS Pゴシック", "MS PGothic", sans-serif;
            text-align: center;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        #container {
            background-color: #ffffff;
            width: 80%;
            max-width: 600px;
            margin: 0 auto;
            border: 2px solid #666;
            padding: 20px;
            box-shadow: 5px 5px 0px #999;
        }
        h1 {
            background-color: #000080;
            color: white;
            padding: 10px;
            font-size: 24px;
            margin-top: 0;
        }
        .main-image {
            margin: 20px 0;
            border: 1px solid #ccc;
            max-width: 100%;
            height: auto;
        }
        .profile-section {
            text-align: left;
            margin: 20px auto;
            width: fit-content;
            line-height: 1.8;
        }
        .item-label {
            font-weight: bold;
            color: #000080;
        }
        hr {
            border: 0;
            border-top: 1px double #8c8b8b;
            margin: 20px 0;
        }
        footer {
            margin-top: 50px;
            font-size: 11px;
            color: #888;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
        .counter {
            font-family: "Courier New", Courier, monospace;
            background: #000;
            color: #0f0;
            padding: 2px 5px;
            font-weight: bold;
        }
        marquee {
            color: #ff0000;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div id="container">
    <marquee>ようこそ、田所のホームページへ！</marquee>
    
    <h1>Welcome to Tadokoro's Web Page</h1>

    <img src="TDKR.png" alt="田所の近影" class="main-image">
    
    <p>いらっしゃいませ！あなたは <span class="counter">00114514</span> 人目の訪問者です。</p>
    
    <hr>

    <div class="profile-section">
        <p><span class="item-label">名前：</span> 田所 浩二</p>
        <p><span class="item-label">趣味：</span> 空手、水泳</p>
        <p><span class="item-label">好きな食べ物：</span> アイスティー、ラーメン（屋台の！）、バッチェ冷えたビール</p>
        <p><span class="item-label">職業：</span> ビデオ出演など</p>
    </div>

    <hr>

    <p>最近は暑い日が続きますね(；´∀｀) 皆さんも水分補給を忘れずに！</p>

    <footer>
        ※このホームページの内容はすべてフィクションです。<br>
        実在の人物や団体、場所とは一切関係ありません。
    </footer>
</div>

</body>
</html>
